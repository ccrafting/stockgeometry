<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>StockGeometry</title>
  <style>
    :root {
      --bg: #0a1018;
      --panel: #121a27;
      --line: #29374e;
      --text: #e7eef8;
      --muted: #9ab0cc;
      --link: #a7ceff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 10% 0%, #18263a 0%, var(--bg) 58%);
      color: var(--text);
      font-family: "Aptos", "Segoe UI Variable", "Segoe UI", "Helvetica Neue", sans-serif;
      display: grid;
      place-items: center;
      padding: 18px 12px;
    }
    .pf-home {
      width: 100%;
      max-width: 880px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px 16px;
    }
    .pf-home h1 {
      margin: 0;
      font-size: clamp(1.25rem, 0.9rem + 1.6vw, 2.0rem);
    }
    .pf-home p {
      margin: 8px 0 0 0;
      color: var(--muted);
      line-height: 1.45;
    }
    .pf-home a {
      margin-top: 14px;
      display: inline-block;
      color: #08121d;
      background: var(--link);
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      padding: 9px 14px;
    }
  </style>
</head>
<body>
  <main class="pf-home">
    <h1>Current Object Dashboard</h1>
    <p>Explore current structural reads across object pages with price-first context, support versus pressure balance, and relational mapping.</p>
    <a href="dashboards/latest/index.html">Open latest dashboard</a>
  </main>
</body>
</html>
