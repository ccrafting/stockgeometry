<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StockGeometry Daily Feed</title>
  <style>
    body { margin:0; font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:#f3f5f8; color:#111827; }
    .wrap { max-width: 1280px; margin: 24px auto 80px; padding: 0 16px; }
    h1 { margin: 0 0 16px; }
    .entry { background:#fff; border:1px solid #d1d5db; border-radius:12px; margin:0 0 18px; padding:10px; }
    iframe.post { width:100%; border:0; display:block; min-height:1200px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>StockGeometry Daily Feed</h1>
    <section class="entry"><iframe class="post" src="posts/2026-03-23-xlk.html" loading="lazy" title="2026-03-23-xlk"></iframe></section>
    <section class="entry"><iframe class="post" src="posts/2026-03-23-spy.html" loading="lazy" title="2026-03-23-spy"></iframe></section>
  </div>
  <script>
    function resizeFrame(f){
      try{
        const d = f.contentDocument || f.contentWindow.document;
        if (d && d.documentElement) f.style.height = d.documentElement.scrollHeight + "px";
      } catch(e){}
    }
    function bind(){
      document.querySelectorAll("iframe.post").forEach(f => {
        f.addEventListener("load", () => resizeFrame(f));
        setInterval(() => resizeFrame(f), 1500);
      });
    }
    window.addEventListener("load", bind);
  </script>
</body>
</html>
