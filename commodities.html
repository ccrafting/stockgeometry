<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StockGeometry Daily Feed Commodities</title>
  <style>
    :root {
      --bg1: #f7fafc;
      --bg2: #eef3f8;
      --text: #111827;
      --muted: #6b7280;
      --line: #d1d5db;
      --card-bg: rgba(255, 255, 255, 0.84);
      --entry-bg: rgba(255, 255, 255, 0.50);
      --entry-shadow: 0 16px 44px rgba(15, 23, 42, 0.08);
      --btn-bg: #ffffff;
      --btn-text: #111827;
      --btn-border: #cbd5e1;
      --btn-hover: #f3f4f6;
    }
    :root[data-theme="dark"] {
      --bg1: #0b1220;
      --bg2: #0f172a;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #243041;
      --card-bg: rgba(11, 18, 32, 0.74);
      --entry-bg: rgba(15, 23, 42, 0.42);
      --entry-shadow: none;
      --btn-bg: #111827;
      --btn-text: #e5e7eb;
      --btn-border: #374151;
      --btn-hover: #1f2937;
    }
    body {
      margin: 0;
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .wrap {
      max-width: 1280px;
      margin: 22px auto 80px;
      padding: 0 16px;
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 0 0 16px;
    }
    .head-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .page-title {
      margin: 0;
      font-size: clamp(32px, 4.8vw, 56px);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .sub {
      color: var(--muted);
      margin: 8px 0 20px;
      font-size: 14px;
    }
    .mode-btn {
      border: 1px solid var(--btn-border);
      color: var(--btn-text);
      background: var(--btn-bg);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .mode-btn:hover {
      background: var(--btn-hover);
    }
    .archive-btn {
      border: 1px solid var(--btn-border);
      color: var(--btn-text);
      background: var(--btn-bg);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      text-decoration: none;
      line-height: 1;
      display: inline-flex;
      align-items: center;
    }
    .archive-btn:hover {
      background: var(--btn-hover);
    }
    .entry {
      margin: 0 0 28px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--entry-bg);
      box-shadow: var(--entry-shadow);
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 22px;
      background: var(--card-bg);
      backdrop-filter: blur(8px);
    }
    .archive-list {
      list-style: none;
      margin: 0;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card-bg);
      overflow: hidden;
    }
    .coming-soon {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card-bg);
      padding: 20px;
    }
    .coming-soon h2 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.2;
    }
    .coming-soon p {
      margin: 8px 0;
      color: var(--muted);
      line-height: 1.6;
    }
    .coming-soon .archive-link {
      display: inline-flex;
      margin-top: 10px;
    }
    .archive-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }
    .archive-item:last-child {
      border-bottom: 0;
    }
    .archive-link {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }
    .archive-link:hover {
      text-decoration: underline;
    }
    .meta {
      margin-top: 4px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }
    @media (max-width: 820px) {
      .wrap {
        margin: 14px auto 36px;
        padding: 0 10px;
      }
      .entry {
        padding: 12px;
        border-radius: 18px;
      }
      .card {
        padding: 16px;
        border-radius: 16px;
      }
      .page-title {
        font-size: clamp(28px, 8vw, 42px);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1 class="page-title">StockGeometry Daily Feed Commodities</h1>
      <div class="head-actions">
        <a class="archive-btn" href="index.html">Home</a>
        <button id="mode-toggle" class="mode-btn" type="button" aria-label="Toggle dark mode">☀</button>
      </div>
    </div>
    <p class="sub">Commodities-focused posts and snapshots.</p>
    <article class="entry">
      <section class="card">
        <div class="coming-soon"><h2>Commodities Page Coming Soon</h2><p>We are preparing commodities-focused reads and snapshots for this section.</p><p>Check back soon for gold, oil, metals, and agriculture coverage.</p><a class="archive-link" href="index.html">Return to Home</a></div>
      </section>
    </article>
  </div>
  <script>
    (function () {
      const key = "sg_theme";
      const root = document.documentElement;
      const btn = document.getElementById("mode-toggle");
      function apply(theme) {
        root.setAttribute("data-theme", theme);
        if (btn) btn.setAttribute("title", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
      }
      const stored = localStorage.getItem(key);
      const preferredDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      apply(stored || (preferredDark ? "dark" : "light"));
      if (btn) {
        btn.addEventListener("click", function () {
          const curr = root.getAttribute("data-theme") || "light";
          const next = curr === "dark" ? "light" : "dark";
          localStorage.setItem(key, next);
          apply(next);
        });
      }
    })();
  </script>
</body>
</html>
